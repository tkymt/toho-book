name: Build The Book
on: [push]
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Update Ubuntu
              run: |
                sudo apt update
                sudo apt full-upgrade -y
            
            - name: Set locale to Japanese
              run: |
                 sudo apt-get update
                 sudo apt-get install -y locales
                 sudo locale-gen ja_JP.UTF-8
                 sudo update-locale LANG=ja_JP.UTF-8
                 echo "LANG=ja_JP.UTF-8" >> $GITHUB_ENV

            - name: Install packages
              run: |
                sudo apt update
                sudo apt install -y wget gzip tar perl

            - name: Install Tex Live
              run: |
                wget https://mirror.ctan.org/systems/texlive/tlnet/install-tl-unx.tar.gz
                zcat < install-tl-unx.tar.gz | tar xf -
                rm install-tl-unx.tar.gz
                perl install-tl-*/install-tl --no-interaction -texdir "$HOME"/texlive
                echo "$HOME"/texlive/bin/x86_64-linux >> $GITHUB_PATH

            - name: Debug Tex Live bin Path
              run: |
                ls -r "$HOME"/texlive

            - name: Set up Ruby
              uses: ruby/setup-ruby@v1
              with: 
                ruby-version: 3

            - name: Update gem
              run: |
                gem update
                gem update --system
            
            - name: Install Rake
              run: |
                gem update
                gem install rake

            - name: Install Re:VIEW
              run: |
                gem update
                gem install review

            - name: Checkout repository
              uses: actions/checkout@v4
            
            - name: Build Book
              run: |
                cd $GITHUB_WORKSPACE
                rake pdf
            
            - name: Debug List files
              run: |
                ls -r $GIT_HUB_WORKSPACE
            
            - name: Upload Artifact
              uses: actions/upload-artifact@v4
              with:
                name: pdf
                path: $GITHUB_WORKSPACE/*.pdf
